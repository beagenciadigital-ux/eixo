# Postgres only — run from the folder that contains this file:
#   docker compose -f docker-compose.db.yml up -d
services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: promisance
    volumes:
      - promisance_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d promisance"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  promisance_pgdata:
